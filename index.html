<html lang="zh-TW">
<head>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;background:#0a0a0a;color:#e0e0e0;line-height:1.7}

.header{max-width:1000px;margin:0 auto;padding:60px 24px 40px;text-align:center}
.header h1{font-size:36px;font-weight:700;color:#fff;margin-bottom:8px}
.header p{font-size:15px;color:rgba(255,255,255,.4)}

.search-bar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.95);backdrop-filter:blur(12px);padding:14px 24px;border-bottom:1px solid rgba(255,255,255,.05)}
.search-bar input{width:100%;max-width:600px;display:block;margin:0 auto;padding:10px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-size:15px;outline:none;font-family:inherit}
.search-bar input:focus{border-color:rgba(212,163,115,.4);background:rgba(255,255,255,.08)}
.search-bar input::placeholder{color:rgba(255,255,255,.25)}

.container{max-width:1000px;margin:0 auto;padding:24px}

/* Category tabs */
.cat-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.cat-btn{padding:8px 18px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.4);font-size:13px;cursor:pointer;transition:all .2s;font-family:inherit}
.cat-btn:hover{border-color:rgba(255,255,255,.2);color:#fff}
.cat-btn.active{background:rgba(212,163,115,.2);border-color:#d4a373;color:#d4a373}

/* Category section */
.category{margin-bottom:40px}
.category.hidden{display:none}
.cat-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.cat-title .count{font-size:13px;color:rgba(255,255,255,.3);font-weight:400}

/* Card grid */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:16px 18px;transition:all .25s;cursor:pointer}
.card:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);transform:translateY(-1px)}
.card a{text-decoration:none;color:inherit;display:block}
.card .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:8px;margin-bottom:6px}
.card h3{font-size:16px;font-weight:600;color:#fff;margin-bottom:4px}
.card .url{font-size:12px;color:rgba(255,255,255,.2);margin-bottom:4px;word-break:break-all}
.card p{font-size:13px;color:rgba(255,255,255,.45);line-height:1.5}

/* Footer */
.footer{text-align:center;padding:40px 24px;color:rgba(255,255,255,.15);font-size:13px}
.footer .btn{display:inline-block;margin-top:12px;padding:8px 20px;border-radius:20px;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.3);text-decoration:none;font-size:12px;transition:all .3s}
.footer .btn:hover{border-color:rgba(255,255,255,.2);color:#fff}

@media(max-width:600px){
  .card-grid{grid-template-columns:1fr}
  .header h1{font-size:28px}
}
</style>
</head>

// Extract categories
const cats = [...new Set(pages.map(p=>p.cat))];

// Render category nav
const navEl = document.getElementById('catNav');
navEl.innerHTML = `<button class="cat-btn active" onclick="switchCat('all',this)">📋 全部</button>` +
  cats.map(c=>`<button class="cat-btn" onclick="switchCat('${c}',this)">${c}</button>`).join('');

// Render all pages
function render(filterCat='all', query=''){
  const el = document.getElementById('content');
  const q = query.toLowerCase().trim();
  
  // Group by category
  let groups = {};
  cats.forEach(c=>groups[c]=[]);
  
  pages.forEach(p=>{
    if(filterCat!=='all' && p.cat!==filterCat) return;
    if(q && !p.title.toLowerCase().includes(q) && !p.tags.toLowerCase().includes(q) && !p.desc.toLowerCase().includes(q)) return;
    (groups[p.cat] || (groups[p.cat]=[])).push(p);
  });
  
  let html='';
  cats.forEach(c=>{
    const list=groups[c];
    if(!list||!list.length) return;
    html+=`<div class="category">
      <div class="cat-title">${c}<span class="count">${list.length}</span></div>
      <div class="card-grid">`;
    list.forEach(p=>{
      const tagColors={旅行:'rgba(212,163,115,.15)',新聞:'rgba(231,111,81,.15)',股票:'rgba(42,157,143,.15)',學術:'rgba(233,196,106,.15)',教材:'rgba(102,126,234,.15)',工具:'rgba(130,130,130,.15)'};
      const tc=tagColors[p.cat]||'rgba(255,255,255,.06)';
      const tn={旅行:'#d4a373',新聞:'#e76f51',股票:'#2a9d8f',學術:'#e9c46a',教材:'#667eea',工具:'#888'};
      html+=`<div class="card"><a href="${p.url}">
        <span class="tag" style="background:${tc};color:${tn[p.cat]||'#999'}">${p.cat}</span>
        <h3>${p.title}</h3>
        <div class="url">${p.url}</div>
        ${p.desc ? `<p>${p.desc}</p>` : ''}
      </a></div>`;
    });
    html+=`</div></div>`;
  });
  
  el.innerHTML = html || '<p style="text-align:center;color:rgba(255,255,255,.3);padding:60px 0">找不到符合的頁面</p>';
}

// Switch category
function switchCat(cat, btn){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(cat, document.getElementById('search').value);
}

// Search
function filterPages(){
  render(document.querySelector('.cat-btn.active')?.textContent.includes('全部')?'all':document.querySelector('.cat-btn.active')?.textContent||'all',
    document.getElementById('search').value);
}

render();
</script>
