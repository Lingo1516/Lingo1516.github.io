<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>小綠繪畫工具 🎨</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Top Toolbar */
.toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  background: #16213e;
  border-bottom: 1px solid #0f3460;
  flex-wrap: wrap;
  z-index: 10;
}

.tool-group {
  display: flex;
  gap: 4px;
  align-items: center;
}

.tool-group::after {
  content: '';
  width: 1px;
  height: 28px;
  background: #0f3460;
  margin: 0 4px;
}

.tool-group:last-child::after { display: none; }

.tool-btn {
  width: 36px;
  height: 36px;
  border: 2px solid transparent;
  border-radius: 8px;
  background: #1a1a2e;
  color: #e0e0e0;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.tool-btn:hover { background: #0f3460; }
.tool-btn.active { border-color: #e94560; background: #0f3460; }

.color-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 3px solid #16213e;
  cursor: pointer;
  transition: transform 0.15s;
}
.color-btn:hover { transform: scale(1.15); }
.color-btn.active { border-color: #e94560; box-shadow: 0 0 8px #e94560; }

.size-slider {
  width: 80px;
  accent-color: #e94560;
}

.label {
  font-size: 11px;
  color: #888;
  margin-right: 4px;
}

/* Canvas Area */
.canvas-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #ffffff;
}

canvas {
  display: block;
  cursor: crosshair;
}

/* Bottom Status */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 12px;
  background: #16213e;
  border-top: 1px solid #0f3460;
  font-size: 12px;
  color: #888;
}

/* Color Palette */
.palette {
  display: flex;
  gap: 4px;
  align-items: center;
}

/* Mobile adjustments */
@media (max-width: 600px) {
  .toolbar { padding: 6px 8px; gap: 4px; }
  .tool-btn { width: 32px; height: 32px; font-size: 16px; }
  .color-btn { width: 28px; height: 28px; }
  .size-slider { width: 60px; }
  .label { display: none; }
}
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <div class="tool-group">
    <button class="tool-btn active" data-tool="brush" title="畫筆">✏️</button>
    <button class="tool-btn" data-tool="eraser" title="橡皮擦">🧹</button>
    <button class="tool-btn" data-tool="line" title="直線">╱</button>
    <button class="tool-btn" data-tool="rect" title="矩形">▭</button>
    <button class="tool-btn" data-tool="circle" title="圓形">◯</button>
    <button class="tool-btn" data-tool="arrow" title="箭頭">➜</button>
    <button class="tool-btn" data-tool="text" title="文字">T</button>
    <button class="tool-btn" data-tool="fill" title="填滿油漆桶">🪣</button>
  </div>

  <div class="tool-group">
    <span class="label">顏色</span>
    <div class="palette">
      <div class="color-btn active" style="background:#e94560" data-color="#e94560"></div>
      <div class="color-btn" style="background:#0f3460" data-color="#0f3460"></div>
      <div class="color-btn" style="background:#1a1a2e" data-color="#1a1a2e"></div>
      <div class="color-btn" style="background:#533483" data-color="#533483"></div>
      <div class="color-btn" style="background:#00b4d8" data-color="#00b4d8"></div>
      <div class="color-btn" style="background:#06d6a0" data-color="#06d6a0"></div>
      <div class="color-btn" style="background:#ffd166" data-color="#ffd166"></div>
      <div class="color-btn" style="background:#ef476f" data-color="#ef476f"></div>
      <div class="color-btn" style="background:#ffffff" data-color="#ffffff"></div>
      <input type="color" id="customColor" value="#e94560" style="width:28px;height:28px;border:none;cursor:pointer;border-radius:50%;">
    </div>
  </div>

  <div class="tool-group">
    <span class="label">粗細</span>
    <input type="range" class="size-slider" id="brushSize" min="1" max="50" value="3">
    <span id="sizeLabel" style="font-size:12px;min-width:24px;">3</span>
  </div>

  <div class="tool-group">
    <button class="tool-btn" id="undoBtn" title="Undo (Ctrl+Z)">↩️</button>
    <button class="tool-btn" id="redoBtn" title="Redo (Ctrl+Y)">↪️</button>
    <button class="tool-btn" id="clearBtn" title="清除畫布">🗑️</button>
    <button class="tool-btn" id="saveBtn" title="存 PNG">💾</button>
  </div>
</div>

<!-- Canvas -->
<div class="canvas-container" id="canvasContainer">
  <canvas id="drawCanvas"></canvas>
</div>

<!-- Status Bar -->
<div class="status-bar">
  <span id="statusText">✏️ 畫筆模式</span>
  <span id="coordText">0, 0</span>
</div>

<script>
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('canvasContainer');

// State
let currentTool = 'brush';
let currentColor = '#e94560';
let brushSize = 3;
let isDrawing = false;
let startX, startY;
let lastX, lastY;
let history = [];
let historyIndex = -1;
let snapshot;

// Resize canvas
function resizeCanvas() {
  const rect = container.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  // Restore from history if exists
  if (history.length > 0 && historyIndex >= 0) {
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0);
    img.src = history[historyIndex];
  } else {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
}

// Save state to history
function saveState() {
  historyIndex++;
  history = history.slice(0, historyIndex);
  history.push(canvas.toDataURL());
  // Limit history
  if (history.length > 50) {
    history.shift();
    historyIndex--;
  }
}

// Undo
function undo() {
  if (historyIndex > 0) {
    historyIndex--;
    const img = new Image();
    img.onload = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
    };
    img.src = history[historyIndex];
  }
}

// Redo
function redo() {
  if (historyIndex < history.length - 1) {
    historyIndex++;
    const img = new Image();
    img.onload = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
    };
    img.src = history[historyIndex];
  }
}

// Get position
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return {
    x: (touch.clientX - rect.left) * (canvas.width / rect.width),
    y: (touch.clientY - rect.top) * (canvas.height / rect.height)
  };
}

// Drawing functions
function startDraw(e) {
  e.preventDefault();
  isDrawing = true;
  const pos = getPos(e);
  startX = lastX = pos.x;
  startY = lastY = pos.y;

  if (currentTool === 'brush' || currentTool === 'eraser') {
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  }

  if (currentTool === 'text') {
    const text = prompt('輸入文字：');
    if (text) {
      ctx.font = `${brushSize * 4 + 12}px -apple-system, sans-serif`;
      ctx.fillStyle = currentColor;
      ctx.fillText(text, pos.x, pos.y);
      saveState();
    }
    isDrawing = false;
    return;
  }

  if (currentTool === 'fill') {
    floodFill(Math.round(pos.x), Math.round(pos.y), currentColor);
    saveState();
    isDrawing = false;
    return;
  }

  // Save snapshot for shapes
  snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
}

function draw(e) {
  e.preventDefault();
  const pos = getPos(e);
  document.getElementById('coordText').textContent = `${Math.round(pos.x)}, ${Math.round(pos.y)}`;

  if (!isDrawing) return;

  if (currentTool === 'brush') {
    ctx.strokeStyle = currentColor;
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  } else if (currentTool === 'eraser') {
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = brushSize * 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  } else if (['line', 'rect', 'circle', 'arrow'].includes(currentTool)) {
    // Restore snapshot and draw preview
    ctx.putImageData(snapshot, 0, 0);
    ctx.strokeStyle = currentColor;
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';

    if (currentTool === 'line') {
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    } else if (currentTool === 'rect') {
      ctx.strokeRect(startX, startY, pos.x - startX, pos.y - startY);
    } else if (currentTool === 'circle') {
      const rx = Math.abs(pos.x - startX) / 2;
      const ry = Math.abs(pos.y - startY) / 2;
      const cx = startX + (pos.x - startX) / 2;
      const cy = startY + (pos.y - startY) / 2;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else if (currentTool === 'arrow') {
      drawArrow(ctx, startX, startY, pos.x, pos.y);
    }
  }

  lastX = pos.x;
  lastY = pos.y;
}

function endDraw(e) {
  if (isDrawing) {
    isDrawing = false;
    if (currentTool !== 'text' && currentTool !== 'fill') {
      saveState();
    }
  }
}

function drawArrow(ctx, fromX, fromY, toX, toY) {
  const headLen = 15 + brushSize;
  const angle = Math.atan2(toY - fromY, toX - fromX);
  ctx.beginPath();
  ctx.moveTo(fromX, fromY);
  ctx.lineTo(toX, toY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(toX, toY);
  ctx.lineTo(toX - headLen * Math.cos(angle - Math.PI / 6), toY - headLen * Math.sin(angle - Math.PI / 6));
  ctx.moveTo(toX, toY);
  ctx.lineTo(toX - headLen * Math.cos(angle + Math.PI / 6), toY - headLen * Math.sin(angle + Math.PI / 6));
  ctx.stroke();
}

// Flood fill
function floodFill(startX, startY, fillColor) {
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  const w = canvas.width;
  const h = canvas.height;

  const idx = (startY * w + startX) * 4;
  const targetR = data[idx], targetG = data[idx+1], targetB = data[idx+2];

  // Parse fill color
  const tmp = document.createElement('canvas').getContext('2d');
  tmp.fillStyle = fillColor;
  tmp.fillRect(0,0,1,1);
  const fc = tmp.getImageData(0,0,1,1).data;

  if (targetR === fc[0] && targetG === fc[1] && targetB === fc[2]) return;

  const stack = [[startX, startY]];
  const visited = new Set();

  while (stack.length > 0) {
    const [x, y] = stack.pop();
    const key = y * w + x;
    if (visited.has(key)) continue;
    if (x < 0 || x >= w || y < 0 || y >= h) continue;

    const i = key * 4;
    if (Math.abs(data[i] - targetR) > 30 || Math.abs(data[i+1] - targetG) > 30 || Math.abs(data[i+2] - targetB) > 30) continue;

    visited.add(key);
    data[i] = fc[0]; data[i+1] = fc[1]; data[i+2] = fc[2]; data[i+3] = 255;

    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  ctx.putImageData(imageData, 0, 0);
}

// Event listeners
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', draw, { passive: false });
canvas.addEventListener('touchend', endDraw);

// Tool buttons
document.querySelectorAll('[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTool = btn.dataset.tool;
    document.getElementById('statusText').textContent = {
      brush: '✏️ 畫筆模式',
      eraser: '🧹 橡皮擦',
      line: '╱ 直線',
      rect: '▭ 矩形',
      circle: '◯ 圓形',
      arrow: '➜ 箭頭',
      text: 'T 文字',
      fill: '🪣 填滿'
    }[currentTool];
    canvas.style.cursor = currentTool === 'text' ? 'text' : currentTool === 'fill' ? 'cell' : 'crosshair';
  });
});

// Color buttons
document.querySelectorAll('[data-color]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-color]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentColor = btn.dataset.color;
  });
});

document.getElementById('customColor').addEventListener('input', (e) => {
  currentColor = e.target.value;
  document.querySelectorAll('[data-color]').forEach(b => b.classList.remove('active'));
});

// Brush size
document.getElementById('brushSize').addEventListener('input', (e) => {
  brushSize = parseInt(e.target.value);
  document.getElementById('sizeLabel').textContent = brushSize;
});

// Undo/Redo/Clear/Save
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('redoBtn').addEventListener('click', redo);
document.getElementById('clearBtn').addEventListener('click', () => {
  if (confirm('確定要清除畫布嗎？')) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    saveState();
  }
});
document.getElementById('saveBtn').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = `drawing-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
});

// Init
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
saveState(); // Save initial blank state
</script>
</body>
</html>
