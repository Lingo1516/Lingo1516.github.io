<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>打磚塊 - 小綠遊戲</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang HK","Heiti TC",sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#e6edf3;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.hdr{position:fixed;top:0;left:0;right:0;background:rgba(13,17,23,0.95);padding:10px 15px;display:flex;justify-content:space-between;align-items:center;z-index:10;border-bottom:1px solid #30363d}
.hdr h1{font-size:18px;color:#58a6ff}
.info{display:flex;gap:15px;font-size:13px;color:#8b949e}
.info span{color:#e6edf3;font-weight:700}
canvas{border-radius:8px;border:1px solid #30363d;margin-top:50px;touch-action:none;display:block}
.ctrl{position:fixed;bottom:0;left:0;right:0;display:flex;z-index:10;padding:8px;gap:6px}
.btn{background:rgba(33,38,45,0.95);border:2px solid #30363d;color:#e6edf3;padding:20px 0;border-radius:12px;font-size:18px;cursor:pointer;touch-action:manipulation;flex:1;text-align:center;transition:all 0.05s}
.btn:active{background:#30363d;transform:scale(0.95)}
.btn.primary{background:rgba(35,134,54,0.9);border-color:#2ea043}
.btn.primary:active{background:#2ea043}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20}
.overlay h2{font-size:32px;color:#58a6ff;margin-bottom:20px;text-shadow:0 0 20px rgba(88,166,255,0.5)}
.overlay p{font-size:16px;color:#8b949e;margin-bottom:10px;text-align:center;line-height:1.6}
.overlay .btn{margin-top:20px;width:200px}
.level-badge{background:#1f6feb;padding:4px 12px;border-radius:20px;font-size:14px;font-weight:700}
.combo{position:fixed;top:60px;left:50%;transform:translateX(-50%);font-size:24px;font-weight:700;color:#f0883e;text-shadow:0 0 10px rgba(240,136,62,0.5);z-index:15;opacity:0;transition:opacity 0.3s}
.combo.show{opacity:1}
.sound-status{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);font-size:14px;color:#58a6ff;z-index:25;background:rgba(13,17,23,0.9);padding:10px 20px;border-radius:25px;border:2px solid #58a6ff;display:flex;align-items:center;gap:8px}
.sound-status .icon{font-size:20px}
</style>
</head>
<body>

<div class="hdr">
<h1>🧱 打磚塊</h1>
<div class="info">
<div>分數: <span id="score">0</span></div>
<div>生命: <span id="lives">3</span></div>
<div class="level-badge">Lv.<span id="level">1</span></div>
</div>
</div>

<div class="combo" id="combo"></div>

<canvas id="game"></canvas>

<div class="ctrl">
<button class="btn" id="leftBtn">⬅️ 左</button>
<button class="btn primary" id="launchBtn">🚀 發射</button>
<button class="btn" id="rightBtn">右 ➡️</button>
</div>

<div class="overlay" id="startScreen">
<h2>🧱 打磚塊</h2>
<p>👆 手指滑動控制擋板<br>📱 或按下方按鈕移動</p>
<button class="btn primary" id="startBtn">🔊 開始遊戲（含音效）</button>
</div>

<div class="overlay" id="gameOverScreen" style="display:none">
<h2>💀 遊戲結束</h2>
<p>最終分數: <span id="finalScore">0</span></p>
<p>到達關卡: <span id="finalLevel">1</span></p>
<button class="btn primary" id="restartBtn">重新開始</button>
</div>

<div class="overlay" id="levelUpScreen" style="display:none">
<h2>🎉 通關！</h2>
<p>進入 Level <span id="nextLevel">2</span></p>
<button class="btn primary" id="nextLevelBtn">下一關</button>
</div>

<div class="sound-status" id="soundStatus">
<span class="icon">🔇</span>
<span id="soundText">點擊「開始遊戲」啟用音效</span>
</div>

<script>
// 🔊 音效系統 - 使用 AudioBuffer 生成聲音（iOS 兼容）
let audioCtx = null;
let audioInitialized = false;

function initAudioOnUserGesture() {
    if (audioInitialized) return true;
    
    try {
        // 建立 AudioContext
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 立即恢復（iOS 需要）
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        
        audioInitialized = true;
        document.getElementById('soundStatus').innerHTML = '<span class="icon">🔊</span><span>音效已啟用！</span>';
        document.getElementById('soundStatus').style.borderColor = '#3fb950';
        document.getElementById('soundStatus').style.color = '#3fb950';
        
        // 1.5 秒後隱藏
        setTimeout(() => {
            document.getElementById('soundStatus').style.display = 'none';
        }, 1500);
        
        return true;
    } catch(e) {
        console.error('Audio init failed:', e);
        return false;
    }
}

// 生成簡單的音效緩衝區
function createSoundBuffer(type) {
    if (!audioCtx) return null;
    
    const sampleRate = audioCtx.sampleRate;
    let duration, frequency, waveType;
    
    switch(type) {
        case 'hit':
            duration = 0.08;
            frequency = 880;
            waveType = 'square';
            break;
        case 'paddle':
            duration = 0.06;
            frequency = 440;
            waveType = 'sine';
            break;
        case 'wall':
            duration = 0.04;
            frequency = 330;
            waveType = 'sine';
            break;
        case 'lose':
            duration = 0.2;
            frequency = 200;
            waveType = 'sawtooth';
            break;
        case 'levelup':
            duration = 0.3;
            frequency = 660;
            waveType = 'sine';
            break;
        case 'gameover':
            duration = 0.4;
            frequency = 150;
            waveType = 'sawtooth';
            break;
        default:
            duration = 0.1;
            frequency = 440;
            waveType = 'sine';
    }
    
    const length = sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, length, sampleRate);
    const data = buffer.getChannelData(0);
    
    for (let i = 0; i < length; i++) {
        const t = i / sampleRate;
        let sample = 0;
        
        switch(waveType) {
            case 'sine':
                sample = Math.sin(2 * Math.PI * frequency * t);
                break;
            case 'square':
                sample = Math.sin(2 * Math.PI * frequency * t) > 0 ? 1 : -1;
                break;
            case 'sawtooth':
                sample = 2 * (frequency * t % 1) - 1;
                break;
        }
        
        // 加入淡入淡出
        const envelope = Math.min(1, i / (sampleRate * 0.01)) * Math.min(1, (length - i) / (sampleRate * 0.01));
        data[i] = sample * envelope * 0.3; // 音量 30%
    }
    
    return buffer;
}

// 快取音效
const soundBuffers = {};

function cacheSounds() {
    const types = ['hit', 'paddle', 'wall', 'lose', 'levelup', 'gameover'];
    types.forEach(type => {
        soundBuffers[type] = createSoundBuffer(type);
    });
}

function playSound(type) {
    if (!audioCtx || !audioInitialized) {
        if (!initAudioOnUserGesture()) return;
    }
    
    // 確保 audio context 是 running
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
    
    try {
        const buffer = soundBuffers[type];
        if (!buffer) return;
        
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);
        source.start(0);
    } catch(e) {
        console.log('Sound play error:', e);
    }
}

// 🎮 遊戲設定
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
    W = Math.min(window.innerWidth - 10, 420);
    H = Math.min(window.innerHeight - 160, 650);
    canvas.width = W;
    canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

// 遊戲狀態
let score = 0;
let lives = 3;
let level = 1;
let combo = 0;
let ballLaunched = false;
let gameRunning = false;

// 擋板
const paddle = {
    w: 100,
    h: 14,
    x: 0,
    y: 0,
    speed: 14,
    color: '#58a6ff'
};

// 球
const ball = {
    x: 0,
    y: 0,
    r: 7,
    dx: 0,
    dy: 0,
    speed: 6,
    color: '#e6edf3'
};

// 磚塊顏色
const brickColors = [
    ['#f85149', '#ff7b72', 30],
    ['#d29922', '#e3b341', 25],
    ['#3fb950', '#56d364', 20],
    ['#58a6ff', '#79c0ff', 15],
    ['#bc8cff', '#d2a8ff', 10],
    ['#f778ba', '#ff9bce', 5],
];

let bricks = [];
const brickRowCount = 5;
const brickColCount = 8;
const brickH = 22;
const brickPadding = 5;
const brickOffsetTop = 55;

function initBricks() {
    bricks = [];
    const bw = (W - brickPadding * (brickColCount + 1)) / brickColCount;
    for (let r = 0; r < brickRowCount; r++) {
        bricks[r] = [];
        for (let c = 0; c < brickColCount; c++) {
            const colorData = brickColors[r % brickColors.length];
            bricks[r][c] = {
                x: brickPadding + c * (bw + brickPadding),
                y: brickOffsetTop + r * (brickH + brickPadding),
                w: bw,
                h: brickH,
                alive: true,
                color: colorData[0],
                highlight: colorData[1],
                points: colorData[2],
                hits: r === 0 ? 2 : 1
            };
        }
    }
}

function resetBall() {
    ballLaunched = false;
    combo = 0;
    ball.x = paddle.x + paddle.w / 2;
    ball.y = paddle.y - ball.r - 2;
    const angle = (Math.random() - 0.5) * 0.8;
    ball.dx = ball.speed * Math.sin(angle);
    ball.dy = -ball.speed * Math.cos(angle);
}

function resetGame() {
    score = 0;
    lives = 3;
    level = 1;
    combo = 0;
    paddle.x = W / 2 - paddle.w / 2;
    paddle.y = H - 45;
    ball.speed = 6;
    initBricks();
    resetBall();
    updateUI();
}

function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('lives').textContent = lives;
    document.getElementById('level').textContent = level;
}

function showCombo(text) {
    const el = document.getElementById('combo');
    el.textContent = text;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 800);
}

// 🎮 控制系統
let moveDir = 0;
let touchActive = false;

function handleMove(clientX) {
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    paddle.x = Math.max(0, Math.min(W - paddle.w, x - paddle.w / 2));
}

// 觸控控制
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    initAudioOnUserGesture();
    if (!ballLaunched) ballLaunched = true;
    touchActive = true;
    handleMove(e.touches[0].clientX);
}, {passive: false});

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (touchActive) handleMove(e.touches[0].clientX);
}, {passive: false});

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    touchActive = false;
}, {passive: false});

// 滑鼠控制
canvas.addEventListener('mousedown', (e) => {
    initAudioOnUserGesture();
    if (!ballLaunched) ballLaunched = true;
    handleMove(e.clientX);
});
canvas.addEventListener('mousemove', (e) => {
    if (e.buttons) handleMove(e.clientX);
});

// 按鈕控制
const leftBtn = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');
const launchBtn = document.getElementById('launchBtn');

leftBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    initAudioOnUserGesture();
    moveDir = -1;
}, {passive: false});
leftBtn.addEventListener('touchend', (e) => {
    e.preventDefault();
    moveDir = 0;
}, {passive: false});
leftBtn.addEventListener('touchcancel', () => moveDir = 0);

rightBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    initAudioOnUserGesture();
    moveDir = 1;
}, {passive: false});
rightBtn.addEventListener('touchend', (e) => {
    e.preventDefault();
    moveDir = 0;
}, {passive: false});
rightBtn.addEventListener('touchcancel', () => moveDir = 0);

launchBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    initAudioOnUserGesture();
    if (!ballLaunched) ballLaunched = true;
}, {passive: false});

// 鍵盤控制
document.addEventListener('keydown', (e) => {
    initAudioOnUserGesture();
    if (e.key === 'ArrowLeft' || e.key === 'a') moveDir = -1;
    if (e.key === 'ArrowRight' || e.key === 'd') moveDir = 1;
    if (e.key === ' ' || e.key === 'Enter') {
        if (!ballLaunched) ballLaunched = true;
    }
});
document.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ArrowRight' || e.key === 'd') {
        moveDir = 0;
    }
});

// 🎮 遊戲邏輯
function update() {
    if (!gameRunning) return;

    if (moveDir !== 0) {
        paddle.x += moveDir * paddle.speed;
        paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
    }

    if (ballLaunched) {
        ball.x += ball.dx;
        ball.y += ball.dy;

        if (ball.x - ball.r < 0) {
            ball.dx = Math.abs(ball.dx);
            ball.x = ball.r;
            playSound('wall');
        }
        if (ball.x + ball.r > W) {
            ball.dx = -Math.abs(ball.dx);
            ball.x = W - ball.r;
            playSound('wall');
        }
        if (ball.y - ball.r < 0) {
            ball.dy = Math.abs(ball.dy);
            ball.y = ball.r;
            playSound('wall');
        }

        if (ball.dy > 0 &&
            ball.y + ball.r >= paddle.y &&
            ball.y + ball.r <= paddle.y + paddle.h + 8 &&
            ball.x >= paddle.x - 5 &&
            ball.x <= paddle.x + paddle.w + 5) {
            
            ball.dy = -Math.abs(ball.dy);
            const hitPos = (ball.x - paddle.x) / paddle.w;
            ball.dx = ball.speed * (hitPos - 0.5) * 2.2;
            
            const maxAngle = 0.85;
            if (Math.abs(ball.dx) > ball.speed * maxAngle) {
                ball.dx = Math.sign(ball.dx) * ball.speed * maxAngle;
            }
            
            combo = 0;
            playSound('paddle');
        }

        for (let r = 0; r < brickRowCount; r++) {
            for (let c = 0; c < brickColCount; c++) {
                const b = bricks[r][c];
                if (!b.alive) continue;

                if (ball.x + ball.r > b.x &&
                    ball.x - ball.r < b.x + b.w &&
                    ball.y + ball.r > b.y &&
                    ball.y - ball.r < b.y + b.h) {
                    
                    const overlapLeft = ball.x + ball.r - b.x;
                    const overlapRight = b.x + b.w - (ball.x - ball.r);
                    const overlapTop = ball.y + ball.r - b.y;
                    const overlapBottom = b.y + b.h - (ball.y - ball.r);
                    
                    const minOverlapX = Math.min(overlapLeft, overlapRight);
                    const minOverlapY = Math.min(overlapTop, overlapBottom);
                    
                    if (minOverlapX < minOverlapY) {
                        ball.dx = -ball.dx;
                    } else {
                        ball.dy = -ball.dy;
                    }

                    b.hits--;
                    if (b.hits <= 0) {
                        b.alive = false;
                        combo++;
                        const points = b.points * (1 + Math.floor(combo / 3));
                        score += points;
                        
                        if (combo >= 5) showCombo(`🔥 ${combo} COMBO! +${points}`);
                        else if (combo >= 3) showCombo(`✨ ${combo} COMBO! +${points}`);
                    }
                    
                    updateUI();
                    playSound('hit');
                    break;
                }
            }
        }

        if (ball.y - ball.r > H) {
            lives--;
            combo = 0;
            updateUI();
            playSound('lose');
            if (lives <= 0) {
                gameOver();
            } else {
                resetBall();
            }
        }
    } else {
        ball.x = paddle.x + paddle.w / 2;
        ball.y = paddle.y - ball.r - 2;
    }

    if (bricks.every(row => row.every(b => !b.alive))) {
        levelUp();
    }
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    for (let r = 0; r < brickRowCount; r++) {
        for (let c = 0; c < brickColCount; c++) {
            const b = bricks[r][c];
            if (!b.alive) continue;

            ctx.fillStyle = b.color;
            ctx.beginPath();
            ctx.roundRect(b.x, b.y, b.w, b.h, 4);
            ctx.fill();

            ctx.fillStyle = b.highlight;
            ctx.beginPath();
            ctx.roundRect(b.x + 2, b.y + 2, b.w - 4, b.h / 3, [3, 3, 0, 0]);
            ctx.fill();

            if (b.hits > 1) {
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('★', b.x + b.w / 2, b.y + b.h / 2 + 4);
            }
        }
    }

    const gradient = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
    gradient.addColorStop(0, '#79c0ff');
    gradient.addColorStop(1, '#1f6feb');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 7);
    ctx.fill();

    ctx.shadowColor = '#58a6ff';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 7);
    ctx.fill();
    ctx.shadowBlur = 0;

    const ballGradient = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 0, ball.x, ball.y, ball.r);
    ballGradient.addColorStop(0, '#ffffff');
    ballGradient.addColorStop(1, '#e6edf3');
    ctx.fillStyle = ballGradient;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowColor = '#e6edf3';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function startGame() {
    initAudioOnUserGesture();
    cacheSounds(); // 快取所有音效
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('gameOverScreen').style.display = 'none';
    document.getElementById('levelUpScreen').style.display = 'none';
    gameRunning = true;
    resetGame();
}

function gameOver() {
    gameRunning = false;
    playSound('gameover');
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalLevel').textContent = level;
    document.getElementById('gameOverScreen').style.display = 'flex';
}

function levelUp() {
    gameRunning = false;
    level++;
    playSound('levelup');
    document.getElementById('nextLevel').textContent = level;
    document.getElementById('levelUpScreen').style.display = 'flex';
}

function nextLevel() {
    document.getElementById('levelUpScreen').style.display = 'none';
    gameRunning = true;
    paddle.x = W / 2 - paddle.w / 2;
    initBricks();
    ball.speed += 0.8;
    resetBall();
    updateUI();
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);
document.getElementById('nextLevelBtn').addEventListener('click', nextLevel);

// 頁面載入時顯示音效提示
window.addEventListener('load', () => {
    document.getElementById('soundStatus').style.display = 'flex';
});

resetGame();
gameLoop();
</script>
</body>
</html>
