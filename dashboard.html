<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>小綠儀表板 🍀</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans TC','PingFang TC',sans-serif;background:#0f172a;color:#f8fafc;padding:20px;-webkit-font-smoothing:antialiased}
h1{font-size:26px;font-weight:800;margin-bottom:4px}
.sub{color:#64748b;font-size:13px;margin-bottom:20px}
.card{background:#1e293b;border-radius:14px;padding:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card .label{color:#94a3b8;font-size:15px}
.card .value{font-size:22px;font-weight:700}
.bar-wrap{background:#334155;height:6px;border-radius:3px;margin-top:4px;margin-bottom:12px}
.bar-fill{height:100%;border-radius:3px;width:90;background:#22c55e;transition:width 1s}
.footer{text-align:center;margin-top:24px;color:#475569;font-size:13px}
.footer a{color:#38bdf8;text-decoration:none}
</style>
</head>
<body>
<h1>🍀 小綠儀表板</h1>
<p class="sub"><span id="ts"></span> · 每秒更新</p>
<div class="card"><span class="label">🔋 電量</span><span class="value" id="bat" style="color:#22c55e">90%</span></div>
<div class="bar-wrap"><div class="bar-fill" id="bar" style="width:90%;background:#22c55e"></div></div>
<div class="card"><span class="label">⚡ 電源</span><span class="value" id="pwr">🔋 電池</span></div>
<div class="card"><span class="label">⏱️ 剩餘</span><span class="value" id="rem" style="color:#38bdf8">20:00</span></div>
<div class="card"><span class="label">🖥️ 螢幕</span><span class="value" id="lid" style="color:#a855f7">🔒 蓋上</span></div>
<div class="card"><span class="label">🛡️ caffeinate</span><span class="value" id="caf" style="color:#22c55e">✅ 運行中</span></div>
<p class="sub" style="margin-top:16px;color:#475569">更新於 2026-05-28 10:52:28</p>
<div class="footer"><a href="https://raw.githubusercontent.com/Lingo1516/Lingo1516.github.io/main/dashboard.html" target="_blank">🔄 強制重新整理</a> · 🍀 MacBook Air M1</div>
<script>
function ts(){document.getElementById('ts').textContent=new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})}
ts();setInterval(ts,1000)
</script>
</body>
</html>
