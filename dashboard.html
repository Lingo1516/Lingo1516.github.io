<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>小綠儀表板 🍀</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans TC','PingFang TC',sans-serif;background:#0f172a;color:#f8fafc;padding:20px;-webkit-font-smoothing:antialiased}
h1{font-size:26px;font-weight:800;margin-bottom:4px}
.sub{color:#64748b;font-size:13px;margin-bottom:20px}
.card{background:#1e293b;border-radius:14px;padding:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card .label{color:#94a3b8;font-size:15px}
.card .value{font-size:22px;font-weight:700}
.bar-wrap{background:#334155;height:6px;border-radius:3px;margin-top:4px;margin-bottom:12px}
.bar-fill{height:100%;border-radius:3px;width:63;background:#22c55e;transition:width 1s}
.footer{text-align:center;margin-top:24px;color:#475569;font-size:13px}
</style>
</head>
<body>
<h1>🍀 小綠儀表板</h1>
<p class="sub">2026-05-27 22:00:27 · 每分鐘自動更新</p>
<div class="card"><span class="label">🔋 電量</span><span class="value" style="color:#22c55e">63%</span></div>
<div class="bar-wrap"><div class="bar-fill"></div></div>
<div class="card"><span class="label">⚡ 電源</span><span class="value">🔋 電池</span></div>
<div class="card"><span class="label">⏱️ 剩餘</span><span class="value" style="color:#38bdf8">0:00</span></div>
<div class="card"><span class="label">🖥️ 螢幕</span><span class="value" style="color:#a855f7">🔒 蓋上</span></div>
<div class="card"><span class="label">🛡️ caffeinate</span><span class="value" style="color:#22c55e">✅ 運行中</span></div>
<div class="footer">🍀 小綠 · MacBook Air M1</div>
</body>
</html>
