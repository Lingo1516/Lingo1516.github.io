<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>小綠儀表板 🍀</title>
<meta http-equiv="refresh" content="30">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans TC','PingFang TC',sans-serif;background:#0f172a;color:#f8fafc;padding:20px;-webkit-font-smoothing:antialiased}
h1{font-size:26px;font-weight:800;margin-bottom:4px;color:#f8fafc}
.sub{color:#64748b;font-size:13px;margin-bottom:20px}
.card{background:#1e293b;border-radius:14px;padding:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card .label{color:#94a3b8;font-size:15px}
.card .value{font-size:22px;font-weight:700}
.green{color:#22c55e}.blue{color:#38bdf8}.orange{color:#f59e0b}.red{color:#ef4444}.purple{color:#a855f7}
.bar-wrap{background:#334155;height:6px;border-radius:3px;margin-top:4px}
.bar-fill{height:100%;border-radius:3px;width:42%;background:#f59e0b;transition:width 1s}
.footer{text-align:center;margin-top:24px;color:#475569;font-size:13px}
.note{border-top:1px solid #334155;margin-top:16px;padding-top:16px;font-size:13px;color:#64748b;line-height:1.6}
</style>
</head>
<body>
<h1>🍀 小綠儀表板</h1>
<p class="sub">📅 2026-05-27 13:56 · 點擊更新</p>
<div class="card"><span class="label">🔋 電量</span><span class="value #f59e0b">42%</span></div>
<div class="bar-wrap"><div class="bar-fill"></div></div>
<div class="card"><span class="label">⚡ 電源</span><span class="value">🔋 電池</span></div>
<div class="card"><span class="label">⏱️ 剩餘</span><span class="value blue">6:13</span></div>
<div class="card"><span class="label">🔒 螢幕</span><span class="value" style="color:#a855f7">🔒 蓋上</span></div>
<div class="card"><span class="label">🛡️ caffeinate</span><span class="value" style="color:#22c55e">✅ 運行中</span></div>
<div class="card"><span class="label">⏳ 運作</span><span class="value" style="font-size:14px">13:56  up 1 day,  2:10, 2 users, load averages: 2.</span></div>
<div class="note">
🔄 每分鐘自動更新<br>
🍀 小綠 · MacBook Air M1
</div>
<div class="footer">🔄 每 30 秒自動更新 · 或下拉重新整理</div>
</body>
</html>
