<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>小綠儀表板 🍀</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans TC','PingFang TC',sans-serif;background:#0f172a;color:#f8fafc;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased}
.container{max-width:400px;width:100%}
.clock{text-align:center;margin-bottom:32px}
.clock .time{font-size:64px;font-weight:200;letter-spacing:4px;line-height:1;color:#f8fafc}
.clock .date{font-size:18px;color:#64748b;margin-top:8px;letter-spacing:1px}
.card{background:#1e293b;border-radius:14px;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card .label{color:#94a3b8;font-size:17px}
.card .value{font-size:26px;font-weight:700}
.bar-wrap{background:#334155;height:8px;border-radius:4px;margin:-6px 0 10px}
.bar-fill{height:100%;border-radius:4px;width:85;background:#22c55e;transition:width 1s}
.footer{text-align:center;margin-top:28px;color:#475569;font-size:13px}
.footer a{color:#38bdf8;text-decoration:none}
</style>
</head>
<body>
<div class="container">
<div class="clock">
<div class="time" id="clock"></div>
<div class="date" id="date"></div>
</div>
<div class="card"><span class="label">🔋 電量</span><span class="value" id="bat" style="color:#22c55e">85%</span></div>
<div class="bar-wrap"><div class="bar-fill" id="bar" style="width:85%;background:#22c55e"></div></div>
<div class="card"><span class="label">⚡ 電源</span><span class="value" id="pwr">🔋 電池</span></div>
<div class="card"><span class="label">⏱️ 剩餘</span><span class="value" id="rem" style="color:#38bdf8">14:41</span></div>
<div class="card"><span class="label">🖥️ 螢幕</span><span class="value" id="lid" style="color:#a855f7">🔒 蓋上</span></div>
<div class="card"><span class="label">🛡️ caffeinate</span><span class="value" id="caf" style="color:#22c55e">✅ 運行中</span></div>
<div class="footer">🍀 小綠 · MacBook Air M1 · 更新 2026-05-28 20:44:40</div>
</div>
<script>
function pad(n){return n.toString().padStart(2,'0')}
function update(){
  var d=new Date();
  document.getElementById('clock').textContent=pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
  document.getElementById('date').textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 '+'星期'+['日','一','二','三','四','五','六'][d.getDay()];}
update();setInterval(update,1000);
</script>
</body>
</html>
