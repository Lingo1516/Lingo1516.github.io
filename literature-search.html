<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>📚 文獻搜尋器 — Google Scholar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#e0e0e0}
.header{text-align:center;padding:30px 20px 20px;background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.1)}
.header h1{font-size:28px;color:#fff;margin-bottom:8px}
.header p{font-size:16px;color:#aaa}
.search-box{max-width:1100px;margin:25px auto;padding:0 15px}
.kw-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.kw-grid input{padding:11px 12px;border-radius:10px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:14px;outline:none;transition:border-color .3s}
.kw-grid input:focus{border-color:#6c63ff}
.kw-grid input::placeholder{color:#666}
.logic-row{text-align:center;margin-bottom:12px}
.logic-row label{font-size:14px;color:#aaa;cursor:pointer;margin:0 12px}
.logic-row input{margin-right:4px}
.btn-search{display:block;margin:0 auto;padding:14px 40px;border-radius:12px;border:none;background:linear-gradient(135deg,#6c63ff,#3f51b5);color:#fff;font-size:17px;font-weight:bold;cursor:pointer;transition:transform .2s,box-shadow .2s}
.btn-search:hover{transform:scale(1.03);box-shadow:0 4px 20px rgba(108,99,255,.4)}
.btn-search:disabled{opacity:.5;cursor:not-allowed;transform:none}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center;margin-top:12px}
.filter-row select{padding:10px 14px;border-radius:10px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:14px;outline:none}
.filter-row select option{background:#1a1a2e;color:#fff}
.status{text-align:center;padding:10px;font-size:15px;color:#aaa}
.status.loading{color:#6c63ff}.status.error{color:#ff6b6b}.status.success{color:#51cf66}
.results-info{max-width:1100px;margin:10px auto;padding:0 15px;font-size:14px;color:#888}
.results{max-width:1100px;margin:0 auto;padding:0 15px 40px}
.paper-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:20px;margin-bottom:16px;transition:transform .2s,border-color .3s}
.paper-card:hover{transform:translateY(-2px);border-color:#6c63ff}
.paper-title{font-size:17px;font-weight:bold;color:#fff;margin-bottom:8px;line-height:1.4}
.paper-title a{color:#fff;text-decoration:none}
.paper-title a:hover{color:#6c63ff;text-decoration:underline}
.paper-authors{font-size:14px;color:#aaa;margin-bottom:6px}
.paper-meta{font-size:13px;color:#888;margin-bottom:8px;display:flex;flex-wrap:wrap;gap:12px}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:bold;margin-right:6px}
.tag-year{background:rgba(108,99,255,.2);color:#a5a0ff}
.tag-cite{background:rgba(255,193,7,.2);color:#ffc107}
.tag-source{background:rgba(0,188,212,.2);color:#00bcd4}
.paper-abstract{font-size:14px;color:#bbb;line-height:1.7;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08)}
.abstract-toggle{color:#6c63ff;cursor:pointer;font-size:13px;margin-top:6px;display:inline-block}
.abstract-toggle:hover{text-decoration:underline}
.pagination{display:flex;justify-content:center;gap:10px;margin-top:20px;padding-bottom:20px}
.pagination button{padding:10px 20px;border-radius:10px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:15px;cursor:pointer;transition:all .3s}
.pagination button:hover:not(:disabled){border-color:#6c63ff;background:rgba(108,99,255,.2)}
.pagination button:disabled{opacity:.3;cursor:not-allowed}
.export-btn{display:block;margin:15px auto;padding:12px 28px;border-radius:10px;border:2px solid #51cf66;background:rgba(81,207,102,.15);color:#51cf66;font-size:15px;cursor:pointer;transition:all .3s}
.export-btn:hover{background:rgba(81,207,102,.3)}
.quick-topics{max-width:1100px;margin:0 auto 15px;padding:0 15px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.quick-topic{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#aaa;font-size:13px;cursor:pointer;transition:all .3s}
.quick-topic:hover{border-color:#6c63ff;color:#fff;background:rgba(108,99,255,.2)}
.api-note{text-align:center;font-size:12px;color:#666;margin-top:5px}
@media(max-width:768px){.kw-grid{grid-template-columns:repeat(2,1fr)}.header h1{font-size:22px}}
</style>
</head>
<body>

<div class="header">
  <h1>📚 文獻搜尋器</h1>
  <p>Google Scholar 學術文獻搜尋 · 多關鍵字 AND/OR 連動 · 附摘要</p>
  <div class="api-note">⚠️ 使用前請執行：cd ~/Desktop/scholar-server && python3 scholar_api.py</div>
</div>

<div class="search-box">
  <div class="kw-grid">
    <input type="text" id="kw1" placeholder="關鍵字 1（必填）" autofocus>
    <input type="text" id="kw2" placeholder="關鍵字 2（選填）">
    <input type="text" id="kw3" placeholder="關鍵字 3（選填）">
    <input type="text" id="kw4" placeholder="關鍵字 4（選填）">
    <input type="text" id="kw5" placeholder="關鍵字 5（選填）">
  </div>
  <div class="logic-row">
    <label><input type="radio" name="logic" value="and" checked> AND（全部都要出現）</label>
    <label><input type="radio" name="logic" value="or"> OR（任一出現即可）</label>
  </div>
  <button class="btn-search" id="btnSearch" onclick="doSearch()">🔍 搜尋 Google Scholar</button>
  <div class="filter-row">
    <select id="yearRange">
      <option value="">不限年份</option>
      <option value="5">近 5 年</option>
      <option value="3">近 3 年</option>
      <option value="10">近 10 年</option>
    </select>
    <select id="sortBy">
      <option value="relevance">相關度排序</option>
      <option value="date">最新發表</option>
      <option value="citations">最多引用</option>
    </select>
    <select id="language">
      <option value="all">不限語言</option>
      <option value="zh-TW">🇹🇼 繁體中文</option>
      <option value="zh-CN">🇨🇳 简体中文</option>
      <option value="en">🇺🇸 English</option>
    </select>
  </div>
</div>

<div class="quick-topics">
  <span class="quick-topic" onclick="quick('人工智慧')">🤖 人工智慧</span>
  <span class="quick-topic" onclick="quick('ESG')">🌱 ESG</span>
  <span class="quick-topic" onclick="quick('machine learning')">🧠 Machine Learning</span>
  <span class="quick-topic" onclick="quick('大數據')">📊 大數據</span>
  <span class="quick-topic" onclick="quick('blockchain')">⛓️ 區塊鏈</span>
  <span class="quick-topic" onclick="quick('永續發展')">♻️ 永續發展</span>
  <span class="quick-topic" onclick="quick('supply chain')">🚚 Supply Chain</span>
  <span class="quick-topic" onclick="quick('數位轉型')">📱 數位轉型</span>
</div>

<div class="status" id="status"></div>
<div class="results-info" id="resultsInfo"></div>
<div class="results" id="results"></div>

<script>
var allResults = [];
var currentPage = 1;
var perPage = 20;
var currentKeyword = '';

// API 端點（本機伺服器）
var API_BASE = 'http://127.0.0.1:5555';

function quick(kw) {
  document.getElementById('kw1').value = kw;
  document.getElementById('kw2').value = '';
  document.getElementById('kw3').value = '';
  document.getElementById('kw4').value = '';
  document.getElementById('kw5').value = '';
  doSearch();
}

function getKeywords() {
  var kws = [];
  for (var i = 1; i <= 5; i++) {
    var v = document.getElementById('kw' + i).value.trim();
    if (v) kws.push(v);
  }
  return kws;
}

function buildQuery(kws, mode) {
  // AND 搜尋：用 Google Scholar 的 AND 語法
  if (mode === 'and' && kws.length > 1) {
    return kws.join(' AND ');
  }
  // OR 搜尋
  if (mode === 'or' && kws.length > 1) {
    return '(' + kws.join(' OR ') + ')';
  }
  return kws[0];
}

function filterResults(results, kws, mode) {
  if (kws.length <= 1) return results;
  return results.filter(function(r) {
    var text = (r.title + ' ' + r.abstract + ' ' + r.journal).toLowerCase();
    if (mode === 'and') {
      return kws.every(function(kw) { return text.indexOf(kw.toLowerCase()) !== -1; });
    } else {
      return kws.some(function(kw) { return text.indexOf(kw.toLowerCase()) !== -1; });
    }
  });
}

async function doSearch(page) {
  page = page || 1;
  currentPage = page;
  var kws = getKeywords();
  if (kws.length === 0) { alert('請輸入至少一個關鍵字'); return; }

  var mode = document.querySelector('input[name=logic]:checked').value;
  var query = buildQuery(kws, mode);
  currentKeyword = kws.join('_');
  var yearRange = document.getElementById('yearRange').value;
  var sortBy = document.getElementById('sortBy').value;
  var language = document.getElementById('language').value;

  var btn = document.getElementById('btnSearch');
  btn.disabled = true;
  btn.textContent = '搜尋中...';
  document.getElementById('status').className = 'status loading';
  document.getElementById('status').textContent = '⏳ 正在搜尋 Google Scholar，請稍候（約 5~10 秒）...';
  document.getElementById('results').innerHTML = '';
  document.getElementById('resultsInfo').textContent = '';

  try {
    var yearLow = '';
    var yearHigh = '';
    if (yearRange) {
      yearLow = (new Date().getFullYear() - parseInt(yearRange)).toString();
      yearHigh = new Date().getFullYear().toString();
    }

    var sortParam = sortBy === 'citations' ? 'relevance' : sortBy;

    var url = API_BASE + '/api/search?q=' + encodeURIComponent(query)
      + '&sort_by=' + sortParam
      + '&language=' + language;
    if (yearLow) url += '&year_low=' + yearLow;
    if (yearHigh) url += '&year_high=' + yearHigh;

    var resp = await fetch(url);
    if (!resp.ok) throw new Error('API 錯誤: ' + resp.status);
    var data = await resp.json();

    if (data.error) throw new Error(data.error);

    allResults = data.results || [];

    // 後端做 AND 過濾後，前端再做一次確保精確
    allResults = filterResults(allResults, kws, mode);

    // 最多引用排序（前端處理）
    if (sortBy === 'citations') {
      allResults.sort(function(a, b) { return (b.citation_count || 0) - (a.citation_count || 0); });
    }

    document.getElementById('status').className = 'status success';
    var langText = {'all': '不限語言', 'zh-TW': '繁體中文', 'zh-CN': '简体中文', 'en': 'English'};
    document.getElementById('status').textContent = '✅ 找到 ' + allResults.length + ' 篇文獻（' + kws.join(' ' + mode.toUpperCase() + ' ') + '，' + langText[language] + '）';

    renderResults();
  } catch (err) {
    document.getElementById('status').className = 'status error';
    document.getElementById('status').textContent = '❌ 搜尋失敗：' + err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 搜尋 Google Scholar';
  }
}

function renderResults() {
  var container = document.getElementById('results');
  var start = (currentPage - 1) * perPage;
  var pageResults = allResults.slice(start, start + perPage);
  var totalPages = Math.ceil(allResults.length / perPage);

  document.getElementById('resultsInfo').textContent =
    '共 ' + allResults.length + ' 篇文獻，第 ' + currentPage + ' / ' + (totalPages || 1) + ' 頁';

  container.innerHTML = '';

  if (pageResults.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#888;padding:40px;">沒有找到相關文獻，試試其他關鍵字？</p>';
    return;
  }

  for (var i = 0; i < pageResults.length; i++) {
    var p = pageResults[i];
    var card = document.createElement('div');
    card.className = 'paper-card';

    var hasAbstract = p.abstract && p.abstract.length > 0;
    var abstractId = 'abs_' + i;

    var html = '';
    html += '<div class="paper-title">';
    html += '<a href="' + esc(p.url || '') + '" target="_blank" rel="noopener">' + esc(p.title) + '</a>';
    html += '</div>';
    html += '<div class="paper-authors">' + esc(p.authors) + '</div>';
    html += '<div class="paper-meta">';
    html += '<span class="tag tag-year">📅 ' + esc(p.year) + '</span>';
    if (p.journal) html += '<span class="tag tag-source">📖 ' + esc(p.journal) + '</span>';
    html += '<span class="tag tag-cite">引用 ' + (p.citation_count || 0) + '</span>';
    html += '<span style="font-size:12px;color:#666;">來源：Google Scholar</span>';
    html += '</div>';

    if (p.doi) {
      html += '<div style="font-size:12px;color:#666;margin-bottom:4px;">DOI: <a href="https://doi.org/' + esc(p.doi) + '" target="_blank" style="color:#6c63ff;">' + esc(p.doi) + '</a></div>';
    }

    if (hasAbstract) {
      var shortAbs = p.abstract.length > 250 ? p.abstract.substring(0, 250) + '...' : p.abstract;
      html += '<div class="paper-abstract" id="' + abstractId + '_short">' + esc(shortAbs) + '</div>';
      if (p.abstract.length > 250) {
        html += '<span class="abstract-toggle" onclick="toggleAbstract(' + i + ')">展開完整摘要 ▼</span>';
        html += '<div class="paper-abstract" id="' + abstractId + '_full" style="display:none;">' + esc(p.abstract) + '</div>';
      }
    } else {
      html += '<div class="paper-abstract" style="color:#666;font-style:italic;">（無摘要）</div>';
    }

    card.innerHTML = html;
    container.appendChild(card);
  }

  if (totalPages > 1) {
    var pag = document.createElement('div');
    pag.className = 'pagination';
    pag.innerHTML = '<button ' + (currentPage <= 1 ? 'disabled' : '') + ' onclick="currentPage--;renderResults()">⬅ 上一頁</button>' +
      '<button style="background:rgba(108,99,255,.2);border-color:#6c63ff;">' + currentPage + ' / ' + totalPages + '</button>' +
      '<button ' + (currentPage >= totalPages ? 'disabled' : '') + ' onclick="currentPage++;renderResults()">下一頁 ➡</button>';
    container.appendChild(pag);
  }

  if (allResults.length > 0) {
    var exp = document.createElement('button');
    exp.className = 'export-btn';
    exp.textContent = '📥 匯出 CSV（含摘要）';
    exp.onclick = exportCSV;
    container.appendChild(exp);
  }

  window.scrollTo({ top: 200, behavior: 'smooth' });
}

function toggleAbstract(i) {
  var shortEl = document.getElementById('abs_' + i + '_short');
  var fullEl = document.getElementById('abs_' + i + '_full');
  var toggle = shortEl.nextElementSibling;
  if (fullEl.style.display === 'none') {
    fullEl.style.display = 'block';
    shortEl.style.display = 'none';
    toggle.textContent = '收起摘要 ▲';
  } else {
    fullEl.style.display = 'none';
    shortEl.style.display = 'block';
    toggle.textContent = '展開完整摘要 ▼';
  }
}

function exportCSV() {
  var header = '\uFEFF標題,作者,年份,期刊,引用數,DOI,URL,摘要\n';
  var rows = allResults.map(function(p) {
    return '"' + esc(p.title).replace(/"/g, '""') + '","' +
      esc(p.authors).replace(/"/g, '""') + '","' +
      esc(p.year) + '","' +
      esc(p.journal).replace(/"/g, '""') + '","' +
      (p.citation_count || 0) + '","' +
      esc(p.doi || '') + '","' +
      esc(p.url || '') + '","' +
      esc((p.abstract || '').replace(/"/g, '""').substring(0, 800)) + '"';
  }).join('\n');
  var blob = new Blob([header + rows], { type: 'text/csv;charset=utf-8;' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'google_scholar_' + currentKeyword + '_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// Enter 鍵觸發搜尋
for (var i = 1; i <= 5; i++) {
  (function(n) {
    document.getElementById('kw' + n).addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doSearch();
    });
  })(i);
}
</script>
</body>
</html>
