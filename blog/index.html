*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:#111;color:#fff;line-height:1.8}
.hero{position:relative;height:50vh;min-height:350px;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.4)),url('images/20260518_dazaifu1.jpg') center/cover}
.hero h1{font-size:48px;font-weight:700;color:#fff;margin-bottom:8px}
.hero p{font-size:18px;color:rgba(255,255,255,.8)}
.filter{position:sticky;top:0;z-index:100;background:rgba(17,17,17,.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.1);padding:14px 20px}
.filter-inner{display:flex;gap:10px;max-width:1200px;margin:0 auto;justify-content:center;flex-wrap:wrap}
.filter-btn{padding:8px 20px;border:1px solid rgba(255,255,255,.2);background:none;color:#aaa;border-radius:20px;font-size:14px;cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:#fff;color:#fff}
.filter-btn.active{background:#e74c3c;border-color:#e74c3c;color:#fff}
.content{max-width:900px;margin:0 auto;padding:20px}
.day-section{display:none;margin-bottom:60px}
.day-section.active{display:block}
.day-header{margin-bottom:30px;padding:24px;background:rgba(255,255,255,.06);border-radius:12px;border-left:4px solid #e74c3c}
.day-header .date{font-size:14px;color:#e74c3c;font-weight:600;margin-bottom:6px}
.day-header h2{font-size:28px;font-weight:700;margin-bottom:10px}
.day-header .summary{font-size:15px;color:#aaa;line-height:1.7}
.day-header a{display:inline-block;margin-top:14px;padding:10px 24px;background:#e74c3c;color:#fff;text-decoration:none;border-radius:20px;font-size:14px;font-weight:600}
/* 交錯排列 */
.story-block{margin-bottom:20px}
.story-block p{font-size:16px;color:#ddd;line-height:1.8;margin-bottom:10px}
.story-block h3{font-size:20px;font-weight:700;color:#fff;margin:24px 0 12px;padding-left:12px;border-left:3px solid #e74c3c}
.story-block img{width:100%;border-radius:8px;margin:12px 0}
.story-block .row{display:flex;gap:12px;margin:12px 0}
.story-block .row img{flex:1;min-width:0;object-fit:cover;height:200px;border-radius:8px}
/* Lightbox */
.lightbox{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:200;align-items:center;justify-content:center}
.lightbox.show{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px}
.lightbox .close{position:absolute;top:20px;right:20px;color:#fff;font-size:32px;cursor:pointer;background:none;border:none}
.lightbox .nav{position:absolute;top:50%;color:#fff;font-size:40px;cursor:pointer;background:none;border:none;padding:20px}
.lightbox .prev{left:10px}.lightbox .next{right:10px}
.footer{text-align:center;padding:40px 20px;color:#666;font-size:14px}
@media(max-width:768px){.hero h1{font-size:32px}.story-block .row{flex-direction:column}.story-block .row img{height:180px}}
</style></head><body>

var allImgs=[];
days.forEach(function(d){d.blocks.forEach(function(b){if(b.img)allImgs.push({src:'images/'+b.img,day:d.day})})});
var filtered=allImgs.slice();
var curIdx=0;

function renderAll(){
var c=document.getElementById('content');
var h='<div class="day-section active"><div class="photos" style="columns:4;column-gap:10px">';
allImgs.forEach(function(p,i){
h+='<img src="'+p.src+'" loading="lazy" style="width:100%;margin-bottom:10px;border-radius:8px;cursor:pointer;break-inside:avoid" onclick="openLB('+i+')">';
});
h+='</div></div>';
c.innerHTML=h;
}

function renderDay(n){
var c=document.getElementById('content');
var d=days.find(function(x){return x.day===n});
if(!d)return;
var h='<div class="day-section active">';
h+='<div class="day-header"><div class="date">DAY '+d.day+' — '+d.date+'</div>';
h+='<h2>'+d.title+'</h2>';
h+='<div class="summary">'+d.summary+'</div>';
h+='<a href="'+d.link+'">閱讀完整文章 →</a></div>';
filtered=[];
d.blocks.forEach(function(b){
if(b.p)h+='<div class="story-block"><p>'+b.p+'</p></div>';
if(b.h)h+='<div class="story-block"><h3>'+b.h+'</h3></div>';
if(b.img){
  filtered.push({src:'images/'+b.img,day:d.day});
  h+='<div class="story-block"><img src="images/'+b.img+'" loading="lazy" onclick="openLB('+(filtered.length-1)+')"></div>';
}
});
h+='</div>';
c.innerHTML=h;
}

function filterDay(d){
document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
if(d==='all'){document.querySelectorAll('.filter-btn')[0].classList.add('active');renderAll();filtered=allImgs.slice()}
else{document.querySelectorAll('.filter-btn')[d].classList.add('active');renderDay(d)}
window.scrollTo({top:document.querySelector('.filter').offsetTop,behavior:'smooth'});
}

function openLB(i){curIdx=i;document.getElementById('lbImg').src=filtered[curIdx].src;document.getElementById('lightbox').classList.add('show')}
function closeLB(){document.getElementById('lightbox').classList.remove('show')}
function navPic(dir){curIdx=(curIdx+dir+filtered.length)%filtered.length;document.getElementById('lbImg').src=filtered[curIdx].src}
document.addEventListener('keydown',function(e){
if(!document.getElementById('lightbox').classList.contains('show'))return;
if(e.key==='Escape')closeLB();if(e.key==='ArrowLeft')navPic(-1);if(e.key==='ArrowRight')navPic(1);
});

renderAll();
</script>
</body></html>
