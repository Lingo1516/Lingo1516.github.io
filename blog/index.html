<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Fukuoka Trip 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#fff}

.hero{position:relative;height:50vh;min-height:350px;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.4)),url('images/20260518_dazaifu1.jpg') center/cover}
.hero h1{font-size:48px;font-weight:700;color:#fff;margin-bottom:8px}
.hero p{font-size:18px;color:rgba(255,255,255,.8)}

.filter{position:sticky;top:0;z-index:100;background:rgba(17,17,17,.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.1);padding:14px 20px}
.filter-inner{display:flex;gap:10px;max-width:1200px;margin:0 auto;justify-content:center;flex-wrap:wrap}
.filter-btn{padding:8px 20px;border:1px solid rgba(255,255,255,.2);background:none;color:#aaa;border-radius:20px;font-size:14px;cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:#fff;color:#fff}
.filter-btn.active{background:#e74c3c;border-color:#e74c3c;color:#fff}

.content{max-width:1200px;margin:0 auto;padding:20px}

/* Day section */
.day-section{display:none;margin-bottom:50px}
.day-section.active{display:block}
.day-header{margin-bottom:24px;padding:24px;background:rgba(255,255,255,.05);border-radius:12px}
.day-header .date{font-size:14px;color:#e74c3c;font-weight:600;margin-bottom:6px}
.day-header h2{font-size:28px;font-weight:700;margin-bottom:8px}
.day-header .summary{font-size:16px;color:#aaa;line-height:1.7}
.day-header a{display:inline-block;margin-top:12px;padding:8px 20px;background:#e74c3c;color:#fff;text-decoration:none;border-radius:20px;font-size:14px;font-weight:600}

/* Photo grid */
.photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.photos img{width:100%;height:180px;object-fit:cover;border-radius:8px;cursor:pointer;transition:transform .2s}
.photos img:hover{transform:scale(1.03)}

/* All view */
.all-view{display:block}
.day-section.all-mode{display:block}
.day-section.all-mode .day-header{display:block}
.day-section.all-mode .photos{margin-bottom:40px}

/* Lightbox */
.lightbox{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:200;align-items:center;justify-content:center}
.lightbox.show{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px}
.lightbox .close{position:absolute;top:20px;right:20px;color:#fff;font-size:32px;cursor:pointer;background:none;border:none}
.lightbox .nav{position:absolute;top:50%;color:#fff;font-size:40px;cursor:pointer;background:none;border:none;padding:20px}
.lightbox .prev{left:10px}
.lightbox .next{right:10px}

.footer{text-align:center;padding:40px 20px;color:#666;font-size:14px}

@media(max-width:768px){.hero h1{font-size:32px}.photos{grid-template-columns:1fr 1fr}.day-header h2{font-size:22px}}
</style></head><body>

<div class="hero">
<h1>福岡之旅 2026</h1>
<p>5 Days 4 Nights in Kyushu</p>
</div>

<div class="filter">
<div class="filter-inner">
<button class="filter-btn active" onclick="filterDay('all')">全部</button>
<button class="filter-btn" onclick="filterDay(1)">Day 1</button>
<button class="filter-btn" onclick="filterDay(2)">Day 2</button>
<button class="filter-btn" onclick="filterDay(3)">Day 3</button>
<button class="filter-btn" onclick="filterDay(4)">Day 4</button>
<button class="filter-btn" onclick="filterDay(5)">Day 5</button>
</div>
</div>

<div class="content" id="content"></div>

<div class="lightbox" id="lightbox">
<button class="close" onclick="closeLightbox()">✕</button>
<button class="nav prev" onclick="navPic(-1)">‹</button>
<button class="nav next" onclick="navPic(1)">›</button>
<img id="lbImg" src="">
</div>

<div class="footer">Lingo Fukuoka Trip 2026</div>

var currentFilter='all';
var allPics=[];
var filtered=[];
var currentIdx=0;

// Build allPics for lightbox
days.forEach(function(d){
  d.pics.forEach(function(p){allPics.push({src:'images/'+p,day:d.day})});
});

function render(){
  var c=document.getElementById('content');
  c.innerHTML='';
  var html='';
  days.forEach(function(d){
    var show=currentFilter==='all'||currentFilter===d.day;
    html+='<div class="day-section'+(show?' active':'')+(currentFilter==='all'?' all-mode':'')+'">';
    html+='<div class="day-header">';
    html+='<div class="date">DAY '+d.day+' — '+d.date+'</div>';
    html+='<h2>'+d.title+'</h2>';
    html+='<div class="summary">'+d.summary+'</div>';
    html+='<p style="margin-top:12px;color:#ccc;font-size:15px;line-height:1.8">'+d.text+'</p>';
    html+='<a href="'+d.link+'">閱讀完整文章 →</a>';
    html+='</div>';
    html+='<div class="photos">';
    d.pics.forEach(function(p,i){
      html+='<img src="images/'+p+'" loading="lazy" onclick="openLB(\''+p+'\','+d.day+')">';
    });
    html+='</div></div>';
  });
  c.innerHTML=html;
}

function filterDay(d){
  currentFilter=d;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
  if(d==='all')document.querySelectorAll('.filter-btn')[0].classList.add('active');
  else document.querySelectorAll('.filter-btn')[d].classList.add('active');
  render();
  window.scrollTo({top:document.querySelector('.filter').offsetTop,behavior:'smooth'});
}

function openLB(pic,day){
  filtered=currentFilter==='all'?allPics:allPics.filter(function(p){return p.day===day});
  currentIdx=filtered.findIndex(function(p){return p.src==='images/'+pic});
  document.getElementById('lbImg').src=filtered[currentIdx].src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('show')}
function navPic(dir){
  currentIdx=(currentIdx+dir+filtered.length)%filtered.length;
  document.getElementById('lbImg').src=filtered[currentIdx].src;
}
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lightbox').classList.contains('show'))return;
  if(e.key==='Escape')closeLightbox();
  if(e.key==='ArrowLeft')navPic(-1);
  if(e.key==='ArrowRight')navPic(1);
});

render();
</script>
</body></html>
