<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>組織理論 vs 組織設計 — 圖解</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }
        .header { text-align: center; padding: 30px 0 20px; }
        .header h1 { font-size: 26px; font-weight: 700; color: #f8fafc; margin-bottom: 6px; }
        .header .sub { font-size: 14px; color: #94a3b8; }

        /* Two-column visual comparison */
        .compare { display: flex; gap: 16px; margin: 20px 0; align-items: stretch; }
        .compare-col { flex: 1; background: #1e293b; border-radius: 14px; padding: 20px 16px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .compare-col.theory { border-top: 3px solid #6366f1; }
        .compare-col.design { border-top: 3px solid #10b981; }
        .compare-col .icon { width: 120px; height: 120px; margin: 0 auto 12px; }
        .compare-col h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .compare-col h2.theory { color: #a5b4fc; }
        .compare-col h2.design { color: #6ee7b7; }
        .compare-col .en { font-size: 11px; color: #64748b; margin-bottom: 12px; }
        .compare-col .desc { font-size: 13px; color: #cbd5e1; text-align: left; padding: 0 4px; }

        /* Tags */
        .tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 10px 0; }
        .tag { font-size: 11px; padding: 3px 8px; border-radius: 5px; font-weight: 500; }
        .tag.t { background: rgba(99,102,241,0.15); color: #818cf8; }
        .tag.d { background: rgba(16,185,129,0.15); color: #34d399; }

        /* VS badge */
        .vs-row { display: flex; align-items: center; justify-content: center; margin: -10px 0; position: relative; z-index: 2; }
        .vs-hex { width: 60px; height: 60px; }

        /* Flow diagram */
        .flow { text-align: center; margin: 24px 0; }
        .flow svg { width: 100%; max-width: 400px; }

        /* Analogy */
        .analogy { text-align: center; margin: 24px 0; }
        .analogy svg { width: 100%; max-width: 400px; }

        /* Key differences - visual cards */
        .diff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .diff-card { background: rgba(15,23,42,0.6); border-radius: 10px; padding: 14px; }
        .diff-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .diff-values { display: flex; gap: 8px; }
        .diff-val { flex: 1; text-align: center; padding: 8px 4px; border-radius: 8px; font-size: 12px; font-weight: 500; }
        .diff-val.left { background: rgba(99,102,241,0.12); color: #a5b4fc; }
        .diff-val.right { background: rgba(16,185,129,0.12); color: #6ee7b7; }

        /* Summary bar */
        .summary { background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(16,185,129,0.1)); border-radius: 12px; padding: 20px; margin: 20px 0; text-align: center; }
        .summary .big { font-size: 18px; font-weight: 700; color: #f8fafc; }
        .summary .big .t { color: #818cf8; }
        .summary .big .d { color: #34d399; }
        .summary .sub { font-size: 13px; color: #64748b; margin-top: 6px; }

        .footer { text-align: center; padding: 20px 0 10px; color: #475569; font-size: 11px; }

        @media (max-width: 480px) {
            .compare { flex-direction: column; }
            .diff-grid { grid-template-columns: 1fr; }
            body { padding: 14px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>組織理論 vs 組織設計</h1>
    <div class="sub">一個是「理解世界」，一個是「改造世界」</div>
</div>

<!-- ====== VS Badge ====== -->
<div class="vs-row">
    <div class="vs-hex"><svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  <polygon points="40,5 72,22 72,58 40,75 8,58 8,22" fill="url(#vsGrad)" opacity="0.9"/>
  <text x="40" y="46" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="800" fill="white">VS</text>
</svg></div>
</div>

<!-- ====== Two Visual Columns ====== -->
<div class="compare">
    <div class="compare-col theory">
        <div class="icon"><svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#1e1b4b" stroke="#6366f1" stroke-width="2" opacity="0.3"/>
  
  <!-- Org chart boxes -->
  <rect x="75" y="30" width="50" height="24" rx="4" fill="#6366f1" opacity="0.6"/>
  <rect x="35" y="70" width="40" height="20" rx="3" fill="#818cf8" opacity="0.5"/>
  <rect x="85" y="70" width="40" height="20" rx="3" fill="#818cf8" opacity="0.5"/>
  <rect x="25" y="100" width="30" height="16" rx="3" fill="#a5b4fc" opacity="0.4"/>
  <rect x="65" y="100" width="30" height="16" rx="3" fill="#a5b4fc" opacity="0.4"/>
  <rect x="105" y="100" width="30" height="16" rx="3" fill="#a5b4fc" opacity="0.4"/>
  
  <!-- Connecting lines -->
  <line x1="100" y1="54" x2="55" y2="70" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="54" x2="105" y2="70" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <line x1="55" y1="90" x2="40" y2="100" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <line x1="55" y1="90" x2="80" y2="100" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <line x1="105" y1="90" x2="120" y2="100" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  
  <!-- Magnifying glass -->
  <circle cx="130" cy="130" r="28" fill="none" stroke="#c4b5fd" stroke-width="3"/>
  <line x1="150" y1="150" x2="168" y2="168" stroke="#c4b5fd" stroke-width="4" stroke-linecap="round"/>
  <circle cx="130" cy="130" r="22" fill="#6366f1" opacity="0.15"/>
  
  <!-- Eye/observe symbol inside magnifier -->
  <ellipse cx="130" cy="130" rx="10" ry="6" fill="none" stroke="#c4b5fd" stroke-width="1.5"/>
  <circle cx="130" cy="130" r="3" fill="#c4b5fd"/>
</svg></div>
        <h2 class="theory">組織理論</h2>
        <div class="en">Organization Theory</div>
        <div class="tags">
            <span class="tag t">學術研究</span>
            <span class="tag t">解釋現象</span>
        </div>
        <div class="desc">研究組織「是什麼」和「為什麼」<br>像科學家一樣觀察、分析、建構理論</div>
    </div>
    <div class="compare-col design">
        <div class="icon"><svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#052e16" stroke="#10b981" stroke-width="2" opacity="0.3"/>
  
  <!-- Blueprint paper -->
  <rect x="40" y="35" width="80" height="100" rx="4" fill="#064e3b" opacity="0.5" stroke="#34d399" stroke-width="1"/>
  <line x1="50" y1="55" x2="110" y2="55" stroke="#34d399" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="70" x2="100" y2="70" stroke="#34d399" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="85" x2="105" y2="85" stroke="#34d399" stroke-width="1" opacity="0.3"/>
  
  <!-- Building structure on blueprint -->
  <rect x="55" y="95" width="20" height="30" rx="2" fill="none" stroke="#6ee7b7" stroke-width="1.5" opacity="0.7"/>
  <rect x="80" y="105" width="20" height="20" rx="2" fill="none" stroke="#6ee7b7" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Compass/divider tool -->
  <line x1="140" y1="40" x2="120" y2="100" stroke="#a7f3d0" stroke-width="2" stroke-linecap="round"/>
  <line x1="140" y1="40" x2="165" y2="90" stroke="#a7f3d0" stroke-width="2" stroke-linecap="round"/>
  <circle cx="140" cy="40" r="3" fill="#10b981"/>
  
  <!-- Ruler -->
  <rect x="100" y="140" width="70" height="12" rx="2" fill="#065f46" stroke="#34d399" stroke-width="1"/>
  <line x1="110" y1="140" x2="110" y2="148" stroke="#6ee7b7" stroke-width="1" opacity="0.6"/>
  <line x1="125" y1="140" x2="125" y2="148" stroke="#6ee7b7" stroke-width="1" opacity="0.6"/>
  <line x1="140" y1="140" x2="140" y2="148" stroke="#6ee7b7" stroke-width="1" opacity="0.6"/>
  <line x1="155" y1="140" x2="155" y2="148" stroke="#6ee7b7" stroke-width="1" opacity="0.6"/>
  
  <!-- Wrench -->
  <circle cx="60" cy="155" r="8" fill="none" stroke="#a7f3d0" stroke-width="2"/>
  <line x1="60" y1="163" x2="60" y2="180" stroke="#a7f3d0" stroke-width="3" stroke-linecap="round"/>
</svg></div>
        <h2 class="design">組織設計</h2>
        <div class="en">Organization Design</div>
        <div class="tags">
            <span class="tag d">實務應用</span>
            <span class="tag d">解決問題</span>
        </div>
        <div class="desc">規劃組織「應該怎麼做」<br>像建築師一樣診斷、規劃、實施</div>
    </div>
</div>

<!-- ====== Flow: Theory → Apply → Design ====== -->
<div class="flow">
    <svg viewBox="0 0 400 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Left box: Theory -->
  <rect x="20" y="15" width="100" height="30" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="70" y="35" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#a5b4fc">理論</text>
  
  <!-- Arrow 1 -->
  <path d="M130 30 L170 30" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
  
  <!-- Middle box: Apply -->
  <rect x="175" y="15" width="60" height="30" rx="6" fill="#334155"/>
  <text x="205" y="35" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8">應用</text>
  
  <!-- Arrow 2 -->
  <path d="M240 30 L280 30" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  
  <!-- Right box: Design -->
  <rect x="285" y="15" width="100" height="30" rx="6" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="335" y="35" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#6ee7b7">設計</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#10b981" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
</div>

<!-- ====== Key Differences ====== -->
<div class="diff-grid">
    <div class="diff-card">
        <div class="diff-label">核心問題</div>
        <div class="diff-values">
            <div class="diff-val left">為什麼？</div>
            <div class="diff-val right">怎麼做？</div>
        </div>
    </div>
    <div class="diff-card">
        <div class="diff-label">時間方向</div>
        <div class="diff-values">
            <div class="diff-val left">回顧過去</div>
            <div class="diff-val right">改變未來</div>
        </div>
    </div>
    <div class="diff-card">
        <div class="diff-label">產出</div>
        <div class="diff-values">
            <div class="diff-val left">理論、模型</div>
            <div class="diff-val right">方案、架構</div>
        </div>
    </div>
    <div class="diff-card">
        <div class="diff-label">角色</div>
        <div class="diff-values">
            <div class="diff-val left">🔬 科學家</div>
            <div class="diff-val right">🏗️ 建築師</div>
        </div>
    </div>
</div>

<!-- ====== Analogy ====== -->
<div class="analogy">
    <svg viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Left: Theory = Biologist -->
  <circle cx="60" cy="40" r="25" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="60" y="36" text-anchor="middle" font-size="20">🔬</text>
  <text x="60" y="52" text-anchor="middle" font-family="system-ui" font-size="9" fill="#818cf8">生物學家</text>
  
  <!-- Arrow left->right -->
  <line x1="90" y1="40" x2="165" y2="40" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3"/>
  
  <!-- Middle text -->
  <text x="128" y="36" text-anchor="middle" font-family="system-ui" font-size="10" fill="#64748b">=</text>
  
  <!-- VS divider -->
  <text x="200" y="44" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="800" fill="#475569">VS</text>
  
  <!-- Arrow right->left -->
  <line x1="235" y1="40" x2="310" y2="40" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3"/>
  
  <!-- Right: Design = Architect -->
  <circle cx="340" cy="40" r="25" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="340" y="36" text-anchor="middle" font-size="20">🏗️</text>
  <text x="340" y="52" text-anchor="middle" font-family="system-ui" font-size="9" fill="#34d399">建築師</text>
</svg>
</div>

<!-- ====== Summary ====== -->
<div class="summary">
    <div class="big"><span class="t">知</span> 與 <span class="d">行</span> 的關係</div>
    <div class="sub">理論指導設計，設計驗證理論 — 知行合一</div>
</div>

<div class="footer">🍀 小綠圖解</div>

</body>
</html>
