<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>🎤 小綠語音</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:-apple-system,'Noto Sans TC','PingFang TC',sans-serif;
    background:#0f172a;color:#f8fafc;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:30px 20px;text-align:center;
}
h1{font-size:28px;font-weight:800;margin-bottom:6px}
.sub{color:#64748b;font-size:14px;margin-bottom:30px}
.mic-btn{
    width:160px;height:160px;border-radius:80px;
    background:linear-gradient(135deg,#38bdf8,#818cf8);
    border:none;font-size:60px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 40px rgba(56,189,248,0.3);
    transition:all 0.2s;margin-bottom:24px;color:#fff;
}
.mic-btn:active{transform:scale(0.92);box-shadow:0 0 60px rgba(56,189,248,0.5)}
.mic-btn.recording{background:linear-gradient(135deg,#ef4444,#f97316);animation:pulse 1s infinite}
@keyframes pulse{0%{box-shadow:0 0 40px rgba(239,68,68,0.3)}50%{box-shadow:0 0 80px rgba(239,68,68,0.6)}100%{box-shadow:0 0 40px rgba(239,68,68,0.3)}}
#result{
    width:100%;max-width:400px;min-height:60px;
    background:#1e293b;border-radius:14px;padding:16px;
    font-size:18px;color:#e2e8f0;margin-bottom:16px;
    display:none;align-items:center;justify-content:center;
    border:1px solid #334155;
}
.send-btn{
    width:100%;max-width:400px;padding:16px;
    background:#22c55e;border:none;border-radius:14px;
    color:#fff;font-size:18px;font-weight:700;cursor:pointer;
    display:none;margin-bottom:12px;
}
.send-btn:active{opacity:0.8}
.status{color:#475569;font-size:13px;margin-top:12px}
</style>
</head>
<body>
<h1>🎤 小綠語音</h1>
<p class="sub">按麥克風說話，直接傳給小綠</p>
<button class="mic-btn" id="micBtn" onclick="startRecording()">🎤</button>
<div id="result"></div>
<button class="send-btn" id="sendBtn" onclick="sendMessage()">📤 傳送給小綠</button>
<p class="status" id="status">按下麥克風開始說話</p>
<script>
let recognizedText = "";
function startRecording(){
    if(!window.webkitSpeechRecognition && !window.SpeechRecognition){
        document.getElementById("status").textContent = "⚠️ 你的瀏覽器不支援語音辨識，請用 Safari 或 Chrome";
        return;
    }
    const recognition = new (window.SpeechRecognition||window.webkitSpeechRecognition)();
    recognition.lang = "zh-TW";
    recognition.continuous = false;
    recognition.interimResults = false;
    
    document.getElementById("micBtn").classList.add("recording");
    document.getElementById("micBtn").textContent = "⏺️";
    document.getElementById("status").textContent = "🎙️ 聆聽中...";
    document.getElementById("result").style.display = "none";
    document.getElementById("sendBtn").style.display = "none";
    
    recognition.onresult = function(e){
        recognizedText = e.results[0][0].transcript;
        document.getElementById("result").style.display = "flex";
        document.getElementById("result").textContent = recognizedText;
        document.getElementById("sendBtn").style.display = "block";
        document.getElementById("sendBtn").textContent = "📤 傳送：「" + recognizedText + "」";
        document.getElementById("status").textContent = "✅ 已辨識，按傳送送出";
        document.getElementById("micBtn").classList.remove("recording");
        document.getElementById("micBtn").textContent = "🎤";
    };
    recognition.onerror = function(){
        document.getElementById("status").textContent = "❌ 辨識失敗，請重試";
        document.getElementById("micBtn").classList.remove("recording");
        document.getElementById("micBtn").textContent = "🎤";
    };
    recognition.start();
}
function sendMessage(){
    if(!recognizedText) return;
    document.getElementById("sendBtn").style.display = "none";
    document.getElementById("status").textContent = "📤 傳送中...";
    const url = "http://100.95.219.87:8888/say?q=" + encodeURIComponent(recognizedText);
    fetch(url).then(r=>r.text()).then(()=>{
        document.getElementById("status").textContent = "✅ 已送出！小綠收到囉 🍀";
        document.getElementById("result").style.display = "none";
        recognizedText = "";
        setTimeout(()=>{document.getElementById("status").textContent = "按麥克風再說一次"},2000);
    }).catch(()=>{
        document.getElementById("status").textContent = "❌ 傳送失敗";
        document.getElementById("sendBtn").style.display = "block";
    });
}
</script>
</body>
</html>
